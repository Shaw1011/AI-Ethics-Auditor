name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install core dependencies
        run: |
          pip install \
            Flask==3.1.2 \
            flask-cors==6.0.2 \
            flask-jwt-extended==4.7.1 \
            flask-limiter==4.1.1 \
            flask-talisman==1.1.0 \
            SQLAlchemy==2.0.44 \
            alembic==1.18.4 \
            bcrypt==4.3.0 \
            python-dotenv==1.0.1 \
            marshmallow==3.26.2 \
            numpy \
            pandas \
            scikit-learn \
            joblib \
            pytest==8.2.0 \
            pytest-cov==5.0.0

      - name: Install ethics ML dependencies
        run: pip install fairlearn shap
        continue-on-error: true

      - name: Run tests with coverage
        env:
          FLASK_ENV: testing
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Security scan (bandit)
        run: |
          pip install bandit
          bandit -r app/ -ll -q
        continue-on-error: true

      - name: Dependency vulnerability check
        run: |
          pip install safety
          safety check -r requirements.txt --output text
        continue-on-error: true

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-ethics-auditor:ci .