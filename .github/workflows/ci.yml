name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety

      - name: Run tests with coverage
        env:
          FLASK_ENV: testing
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=70

      - name: Security scan (bandit)
        run: bandit -r app/ -ll -q

      - name: Dependency vulnerability check (safety)
        run: safety check -r requirements.txt --output text
        continue-on-error: true   # informational until pinned clean

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-ethics-auditor:ci .
